# ============================================================
# Server Configuration
# ============================================================
server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================================
# MySQL Database Configuration
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finsaarthi?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.open-in-view=false

# ============================================================
# Flyway Migration Configuration
# ============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# OTP Configuration
# ============================================================
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.otp.request-limit.max-requests=${OTP_REQUEST_LIMIT_MAX_REQUESTS:3}
app.otp.request-limit.window-minutes=${OTP_REQUEST_LIMIT_WINDOW_MINUTES:10}
app.login.rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.login.rate-limit.window-minutes=${LOGIN_RATE_LIMIT_WINDOW_MINUTES:10}
app.captcha.expiration-minutes=${CAPTCHA_EXPIRATION_MINUTES:5}

# ============================================================
# Brevo Email Configuration
# ============================================================
brevo.api-key=${BREVO_API_KEY:}
brevo.sender-email=${BREVO_SENDER_EMAIL:no-reply@finsaarthi.com}
brevo.sender-name=${BREVO_SENDER_NAME:FinSaarthi}
brevo.connect-timeout-seconds=${BREVO_CONNECT_TIMEOUT_SECONDS:10}
brevo.read-timeout-seconds=${BREVO_READ_TIMEOUT_SECONDS:20}
brevo.max-attempts=${BREVO_MAX_ATTEMPTS:3}
brevo.retry-backoff-millis=${BREVO_RETRY_BACKOFF_MILLIS:750}

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://finsaarthi-six.vercel.app}

# ============================================================
# Java 21 Virtual Threads (Project Loom)
# ============================================================
spring.threads.virtual.enabled=true

# ============================================================
# Application Info
# ============================================================
spring.application.name=finsaarthi-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================================
# Logging
# ============================================================
logging.level.com.finsaarthi=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=INFO
